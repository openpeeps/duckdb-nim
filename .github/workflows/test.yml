name: test
on:
  push:
    paths-ignore:
      - LICENSE
      - README.*
      - examples
  pull_request:
    paths-ignore:
      - LICENSE
      - README.*
      - examples
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        nim-version:
          - 'stable'
    steps:
      - uses: actions/checkout@v3
      - uses: jiro4989/setup-nim-action@v1
        with:
          nim-version: ${{ matrix.nim-version }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Install DuckDB library"
        run: |
          sudo apt-get install -y unzip
          curl -L -o libduckdb.zip https://install.duckdb.org/v1.5.2/libduckdb-linux-amd64.zip
          unzip libduckdb.zip -d duckdb_lib
          sudo cp duckdb_lib/duckdb.h /usr/local/include/
          sudo cp duckdb_lib/duckdb.hpp /usr/local/include/
          sudo cp duckdb_lib/libduckdb.so /usr/local/lib/
          sudo ldconfig

      - run: nimble install -Y
      - run: nim c -r src/duckdb.nim
      - run: nimble test
